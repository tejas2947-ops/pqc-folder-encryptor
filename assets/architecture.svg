<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <defs>
    <linearGradient id="a1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e676;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b0ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="520" rx="12" fill="#080b12"/>

  <!-- Title -->
  <text x="400" y="35" font-family="Consolas, monospace" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">ENCRYPTION FLOW</text>

  <!-- Step 1: Input -->
  <rect x="30" y="60" width="160" height="50" rx="8" fill="none" stroke="#4a5568" stroke-width="1.5"/>
  <text x="110" y="82" font-family="Consolas, monospace" font-size="11" fill="#c8d6e5" text-anchor="middle">Input Folder</text>
  <text x="110" y="98" font-family="Consolas, monospace" font-size="9" fill="#4a5568" text-anchor="middle">files + structure</text>

  <!-- Arrow -->
  <line x1="190" y1="85" x2="230" y2="85" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#4a5568"/></marker></defs>

  <!-- Step 2: Pack -->
  <rect x="240" y="60" width="160" height="50" rx="8" fill="none" stroke="#607d8b" stroke-width="1.5"/>
  <text x="320" y="82" font-family="Consolas, monospace" font-size="11" fill="#c8d6e5" text-anchor="middle">Pack + SHA-256</text>
  <text x="320" y="98" font-family="Consolas, monospace" font-size="9" fill="#607d8b" text-anchor="middle">manifest + blobs</text>

  <!-- Arrow down -->
  <line x1="320" y1="110" x2="320" y2="145" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: KEM Keygen -->
  <rect x="30" y="155" width="200" height="70" rx="8" fill="none" stroke="#00e676" stroke-width="1.5"/>
  <text x="130" y="178" font-family="Consolas, monospace" font-size="12" font-weight="bold" fill="#00e676" text-anchor="middle">ML-KEM-768</text>
  <text x="130" y="195" font-family="Consolas, monospace" font-size="9" fill="#4a5568" text-anchor="middle">FIPS 203</text>
  <text x="130" y="212" font-family="Consolas, monospace" font-size="9" fill="#c8d6e5" text-anchor="middle">keygen + encapsulate</text>

  <!-- Arrow right from KEM -->
  <line x1="230" y1="190" x2="270" y2="190" stroke="#00e676" stroke-width="1.5" marker-end="url(#arrowg)"/>
  <defs><marker id="arrowg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#00e676"/></marker></defs>

  <!-- Step 4: HKDF -->
  <rect x="280" y="155" width="160" height="70" rx="8" fill="none" stroke="#607d8b" stroke-width="1.5"/>
  <text x="360" y="178" font-family="Consolas, monospace" font-size="12" font-weight="bold" fill="#607d8b" text-anchor="middle">HKDF-SHA256</text>
  <text x="360" y="195" font-family="Consolas, monospace" font-size="9" fill="#4a5568" text-anchor="middle">RFC 5869</text>
  <text x="360" y="212" font-family="Consolas, monospace" font-size="9" fill="#c8d6e5" text-anchor="middle">shared secret -> AES key</text>

  <!-- Arrow right from HKDF -->
  <line x1="440" y1="190" x2="480" y2="190" stroke="#607d8b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: AES-GCM -->
  <rect x="490" y="155" width="160" height="70" rx="8" fill="none" stroke="#00b0ff" stroke-width="1.5"/>
  <text x="570" y="178" font-family="Consolas, monospace" font-size="12" font-weight="bold" fill="#00b0ff" text-anchor="middle">AES-256-GCM</text>
  <text x="570" y="195" font-family="Consolas, monospace" font-size="9" fill="#4a5568" text-anchor="middle">FIPS 197</text>
  <text x="570" y="212" font-family="Consolas, monospace" font-size="9" fill="#c8d6e5" text-anchor="middle">encrypt payload</text>

  <!-- Argon2 (password protection) -->
  <rect x="30" y="260" width="200" height="70" rx="8" fill="none" stroke="#9c27b0" stroke-width="1.5"/>
  <text x="130" y="283" font-family="Consolas, monospace" font-size="12" font-weight="bold" fill="#9c27b0" text-anchor="middle">Argon2id</text>
  <text x="130" y="300" font-family="Consolas, monospace" font-size="9" fill="#4a5568" text-anchor="middle">RFC 9106 - 64MB, 3 iter</text>
  <text x="130" y="317" font-family="Consolas, monospace" font-size="9" fill="#c8d6e5" text-anchor="middle">passphrase -> key</text>

  <!-- Arrow right from Argon2 -->
  <line x1="230" y1="295" x2="270" y2="295" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrowp)"/>
  <defs><marker id="arrowp" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#9c27b0"/></marker></defs>

  <!-- Encrypt SK -->
  <rect x="280" y="260" width="160" height="70" rx="8" fill="none" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="360" y="283" font-family="Consolas, monospace" font-size="11" fill="#9c27b0" text-anchor="middle">AES-GCM</text>
  <text x="360" y="300" font-family="Consolas, monospace" font-size="9" fill="#c8d6e5" text-anchor="middle">encrypt KEM</text>
  <text x="360" y="317" font-family="Consolas, monospace" font-size="9" fill="#c8d6e5" text-anchor="middle">secret key</text>

  <!-- ML-DSA Sign -->
  <rect x="490" y="260" width="160" height="70" rx="8" fill="none" stroke="#ff9800" stroke-width="1.5"/>
  <text x="570" y="283" font-family="Consolas, monospace" font-size="12" font-weight="bold" fill="#ff9800" text-anchor="middle">ML-DSA-65</text>
  <text x="570" y="300" font-family="Consolas, monospace" font-size="9" fill="#4a5568" text-anchor="middle">FIPS 204</text>
  <text x="570" y="317" font-family="Consolas, monospace" font-size="9" fill="#c8d6e5" text-anchor="middle">sign everything</text>

  <!-- Arrow down from AES -->
  <line x1="570" y1="225" x2="570" y2="260" stroke="#00b0ff" stroke-width="1.5" marker-end="url(#arrowb)"/>
  <defs><marker id="arrowb" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#00b0ff"/></marker></defs>

  <!-- Final output -->
  <rect x="280" y="370" width="300" height="60" rx="8" fill="none" stroke="url(#a1)" stroke-width="2"/>
  <text x="430" y="396" font-family="Consolas, monospace" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">output.pqc</text>
  <text x="430" y="416" font-family="Consolas, monospace" font-size="9" fill="#4a5568" text-anchor="middle">KEM_CT + salt + encrypted_SK + PK + signature + AES_CT</text>

  <!-- Arrows to output -->
  <line x1="360" y1="330" x2="390" y2="370" stroke="#9c27b0" stroke-width="1" opacity="0.5"/>
  <line x1="570" y1="330" x2="500" y2="370" stroke="#ff9800" stroke-width="1" opacity="0.5"/>

  <!-- Legend -->
  <text x="30" y="470" font-family="Consolas, monospace" font-size="10" font-weight="bold" fill="#4a5568">LEGEND</text>
  <rect x="30" y="480" width="12" height="12" rx="2" fill="none" stroke="#00e676" stroke-width="1.5"/>
  <text x="50" y="491" font-family="Consolas, monospace" font-size="9" fill="#c8d6e5">Post-Quantum KEM</text>
  <rect x="180" y="480" width="12" height="12" rx="2" fill="none" stroke="#00b0ff" stroke-width="1.5"/>
  <text x="200" y="491" font-family="Consolas, monospace" font-size="9" fill="#c8d6e5">Symmetric Encryption</text>
  <rect x="360" y="480" width="12" height="12" rx="2" fill="none" stroke="#ff9800" stroke-width="1.5"/>
  <text x="380" y="491" font-family="Consolas, monospace" font-size="9" fill="#c8d6e5">Digital Signature</text>
  <rect x="520" y="480" width="12" height="12" rx="2" fill="none" stroke="#9c27b0" stroke-width="1.5"/>
  <text x="540" y="491" font-family="Consolas, monospace" font-size="9" fill="#c8d6e5">Password Protection</text>
</svg>
